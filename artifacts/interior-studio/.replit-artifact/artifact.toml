kind = "web"
previewPath = "/"
title = "Interior Studio"
version = "1.0.0"
id = "artifacts/interior-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20798

[services.development]
run = "pnpm --filter @workspace/interior-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/interior-studio", "run", "build" ]
publicDir = "artifacts/interior-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20798"
BASE_PATH = "/"
